slug: quantum-device-design
title: Quantum Device Design Tutorials
leads:
  - zlatko-minev
summary: Qiskit Metal, Palace, and SQDMetal tutorials for quantum device design workflows.
entrypoints:
  - path: notebooks/01_welcome.ipynb
    kind: notebook
    description: Welcome — render your first transmon in three cells, then learn the environment.
  - path: notebooks/02_first_chip_layout.ipynb
    kind: notebook
    description: First chip layout — junction, transmon, CPW resonator, dispersive readout, launchpad.
notebooks:
  - notebooks/01_welcome.ipynb
  - notebooks/02_first_chip_layout.ipynb
  - notebooks/03_transmon_and_resonator.ipynb
  - notebooks/04_qubit_qubit_coupling.ipynb
  - notebooks/05_project.ipynb
assets:
  - assets/1.jpg
python_dependencies:
  - jupyter
  - quantum-metal
  - sqdmetal
system_dependencies:
  - gmsh
  - palace
smoke_commands:
  - test -f notebooks/01_welcome.ipynb
  - test -f notebooks/02_first_chip_layout.ipynb
  - python -c "import importlib.util; assert importlib.util.find_spec('qiskit_metal') is not None"
  - python -c "import importlib.util; assert importlib.util.find_spec('SQDMetal') is not None or importlib.util.find_spec('sqdmetal') is not None"
