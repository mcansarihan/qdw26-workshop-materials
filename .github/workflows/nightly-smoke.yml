name: Nightly Smoke

on:
  schedule:
    - cron: "20 10 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  nightly-smoke:
    name: Nightly Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published image
        run: docker pull ghcr.io/quantum-device-consortium/qdw-workshop-materials:main

      - name: Run smoke checks
        run: docker run --rm ghcr.io/quantum-device-consortium/qdw-workshop-materials:main python scripts/smoke_environment.py
